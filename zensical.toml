[[project.plugins.rss]]
match_path = '^(?:blogs/[^/]+/(?!index\.md$).+\.md$|blog/posts/.+\.md$)'
date_from_meta = [
    {as_creation = "date"}
]
comments_path = "#__comments"
categories = [
    {name = "categories"},
    {name = "tags"},
]