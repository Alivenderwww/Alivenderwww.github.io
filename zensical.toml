[[project.plugins.heti]]
[[project.plugins.blog]]
post_excerpt = "optional"
authors_profiles_name = "Authors"
categories = "true"
archive = "true"
post_readtime = "false"
[[project.plugins.statistics]]
page_check_metadata = "comment"
[[project.plugins.glightbox]]
touchNavigation = "true"
loop = "false"
effect = "zoom"
slide_effect = "slide"
width = "100%"
height = "auto"
zoomable = "true"
draggable = "true"
shadow = "true"
